version: '3.8'

services:
  mysql:
    build: ./mysql
    container_name: property-mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: property_management
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: property-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/property_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
    volumes:
      - uploads_data:/app/uploads
      - templates_data:/app/templates
      - backups_data:/app/backups
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend-admin
    container_name: property-frontend
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
  templates_data:
  backups_data:
